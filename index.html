<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A TRIP TO YOUR DREAM - 特种兵旅程高精设计器</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.0.8/DragDropTouch.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=M+PLUS+Rounded+1c:wght@500;700&family=Fredoka:wght@600&display=swap" rel="stylesheet">
    
    <style>
        /* 全站强制中文字体应用为高级圆体 */
        body, input, button, select, textarea {
            font-family: 'M PLUS Rounded 1c', 'Microsoft YaHei', sans-serif !important;
            background-color: #fafdfee;
        }

        /* 统一英文/数字部分转换为柔和粉色手写体 */
        .handwritten-brand {
            font-family: 'Caveat', 'Fredoka', cursive !important;
            color: #ffb7c5 !important; /* 嫩粉色 */
        }
        
        .eng-sub {
            font-family: 'Fredoka', cursive !important;
            color: #ffb7c5 !important;
        }

        /* 页面三阶段渐隐过渡 */
        .fade-enter-active, .fade-leave-active {
            transition: opacity 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .fade-enter-from, .fade-leave-to {
            opacity: 0;
        }

        /* Vue Transition Group 拖拽平滑动画 */
        .card-move, .card-enter-active, .card-leave-active {
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .card-enter-from, .card-leave-to {
            opacity: 0;
            transform: translateY(12px);
        }
        .card-leave-active { position: absolute; width: 100%; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Figma 设计：淡绿色系网格纹理背景 */
        .bg-grid-green {
            background-size: 35px 35px;
            background-image: linear-gradient(to right, rgba(208, 235, 183, 0.2) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(208, 235, 183, 0.2) 1px, transparent 1px);
        }
        
        /* 地图层级防溢出覆写 */
        .leaflet-container {
            font-family: 'M PLUS Rounded 1c', sans-serif !important;
        }
    </style>
</head>
<body class="h-screen w-screen relative text-slate-700 overflow-hidden">

    <div id="app" class="h-full w-full relative bg-[#F7FDF3]" v-cloak>
        <transition name="fade" mode="out-in">
            
            <div v-if="currentStage === 'landing'" key="landing" class="h-full w-full flex flex-col items-center justify-center relative px-6 bg-grid-green">
                
                <div class="absolute w-[500px] h-[500px] bg-[#D0EBB7]/40 blur-3xl rounded-full -top-40 -left-20 pointer-events-none"></div>
                <div class="absolute w-[450px] h-[450px] bg-pink-100/40 blur-3xl rounded-full -bottom-20 -right-20 pointer-events-none"></div>

                <div class="max-w-2xl text-center space-y-10 animate-fadeIn">
                    <div class="space-y-4">
                        <div class="inline-flex items-center gap-1 px-3 py-0.5 bg-white text-emerald-800 border border-[#D0EBB7] rounded-full text-[10px] font-bold tracking-wider shadow-2xs">
                            🍃 MINT SYSTEM V4.8
                        </div>
                        <h1 class="text-5xl md:text-7xl font-bold text-center tracking-wide handwritten-brand py-2 drop-shadow-2xs">
                            A TRIP TO YOUR DREAM
                        </h1>
                        <p class="text-xs text-slate-400 max-w-xs mx-auto tracking-wide">请输入你的出征目的地与核心预算支配</p>
                    </div>

                    <div class="p-6 bg-white/95 border border-[#D0EBB7] shadow-xl rounded-2xl max-w-sm mx-auto space-y-4">
                        <div class="space-y-3 text-left">
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">🌍 设定目的地城市</label>
                                <input type="text" v-model="destination" placeholder="你想去哪？(如：北京、上海、成都)" class="w-full bg-slate-50 border border-slate-200 px-3 py-2 mt-1 rounded-xl text-xs font-medium focus:outline-none focus:border-[#D0EBB7]">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">💰 财务硬核总盘</label>
                                <input type="number" v-model.number="globalBudget" class="w-full bg-slate-50 border border-slate-200 px-3 py-2 mt-1 rounded-xl text-xs font-mono font-bold text-emerald-700 focus:outline-none focus:border-[#D0EBB7]">
                            </div>
                        </div>
                        <button @click="currentStage = 'wishlist'" class="w-full py-3 bg-[#D0EBB7] hover:bg-[#c2e2a7] text-emerald-950 rounded-xl text-xs font-bold tracking-wide shadow-xs transition-all cursor-pointer">
                            配置心愿资产与预算 →
                        </button>
                    </div>
                </div>
            </div>

            <div v-else-if="currentStage === 'wishlist'" key="wishlist" class="h-full w-full flex flex-col bg-[#F7FDF3]">
                <header class="bg-white border-b border-[#D0EBB7]/60 px-6 py-3 flex items-center justify-between shadow-2xs">
                    <button @click="currentStage = 'landing'" class="text-xs text-slate-400 hover:text-emerald-700">← 返回重置</button>
                    <h1 class="text-3xl font-bold text-center tracking-wide handwritten-brand">A TRIP TO YOUR DREAM</h1>
                    <div class="text-xs font-bold bg-[#D0EBB7]/30 text-emerald-900 px-3 py-1 rounded-lg border border-[#D0EBB7]/40">📍 城市: {{ destination }}</div>
                </header>

                <div class="flex-1 overflow-hidden flex flex-col md:flex-row p-4 md:p-6 gap-5 bg-grid-green">
                    <div class="w-full md:w-85 bg-white p-4 rounded-2xl border border-[#D0EBB7]/60 flex flex-col justify-between shadow-xs">
                        <div class="space-y-3 overflow-y-auto no-scrollbar">
                            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">✍️ 记账与心愿录入</h3>
                            <form @submit.prevent="addSpot" class="space-y-2">
                                <input type="text" v-model="newSpot.name" placeholder="想去的景点、宝藏餐厅名称..." required class="w-full px-3 py-2 text-xs bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-[#D0EBB7]">
                                <div class="grid grid-cols-2 gap-2">
                                    <div class="flex gap-1 items-center bg-slate-50 border border-slate-200 rounded-xl px-2.5 py-1.5">
                                        <span class="text-[10px] text-slate-400 shrink-0">⏱️时长:</span>
                                        <input type="number" v-model.number="newSpot.duration" min="0.5" step="0.5" required class="w-full text-xs font-mono bg-transparent text-right focus:outline-none">
                                        <span class="text-[10px] text-slate-400 shrink-0">h</span>
                                    </div>
                                    <div class="flex gap-1 items-center bg-slate-50 border border-slate-200 rounded-xl px-2.5 py-1.5">
                                        <span class="text-[10px] text-slate-400 shrink-0">💰费用:</span>
                                        <input type="number" v-model.number="newSpot.cost" min="0" step="1" required class="w-full text-xs font-mono bg-transparent text-right focus:outline-none">
                                        <span class="text-[10px] text-slate-400 shrink-0">元</span>
                                    </div>
                                </div>
                                
                                <div class="pt-0.5">
                                    <button type="button" @click="newSpot.showPlanB = !newSpot.showPlanB" class="text-[10px] text-emerald-800 hover:underline focus:outline-none">
                                        {{ newSpot.showPlanB ? '▼ 收起备用方案' : '▶ ➕ 绑定备用 Plan B 平替' }}
                                    </button>
                                    <div v-if="newSpot.showPlanB" class="mt-2 p-2 bg-slate-50 rounded-lg border border-[#D0EBB7] border-dashed space-y-1.5">
                                        <input type="text" v-model="newSpot.bName" placeholder="备选店名/备用地点..." class="w-full px-2 py-1 text-[11px] bg-white border border-slate-200 rounded-md">
                                        <div class="grid grid-cols-2 gap-2">
                                            <input type="number" v-model.number="newSpot.bDuration" placeholder="备用h" class="bg-white border border-slate-200 rounded-md p-1 text-[10px] text-center">
                                            <input type="number" v-model.number="newSpot.bCost" placeholder="备用¥" class="bg-white border border-slate-200 rounded-md p-1 text-[10px] text-center">
                                        </div>
                                    </div>
                                </div>
                                <button type="submit" class="w-full py-2 bg-[#D0EBB7] hover:bg-[#c2e2a7] text-emerald-950 text-xs font-bold rounded-xl cursor-pointer">塞入待编排库</button>
                            </form>
                        </div>
                        
                        <div class="pt-3 border-t border-slate-100 space-y-1.5 text-xs">
                            <div class="flex justify-between text-slate-400"><span>已选资产项:</span><span class="font-bold text-slate-800">{{ wishlist.length }} 个</span></div>
                            <div class="flex justify-between text-slate-400">
